name: Build, Test, and Deploy QEMU (Windows ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      qemu_version:
        description: 'QEMU tag to build (e.g. v9.2.0)'
        required: true
        default: 'v9.2.0'

permissions:
  contents: write

jobs:
  build-test-pack:
    runs-on: windows-11-arm

    defaults:
      run:
        shell: msys2 {0}

    # Resolve the QEMU ref: use the tag on push/tag triggers,
    # or the manually supplied version on workflow_dispatch.
    env:
      QEMU_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.qemu_version || github.ref_name }}

    steps:
      - name: Checkout Pipeline Configuration
        uses: actions/checkout@v4
        with:
          path: config-repo

      - name: Checkout QEMU Source Code
        uses: actions/checkout@v4
        with:
          repository: 'qemu/qemu'
          ref: ${{ env.QEMU_REF }}
          path: qemu-source

      - name: Setup MSYS2 Environment with NSIS
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          # Inherit PATH so the runner can find the x64 NSIS build
          path-type: inherit
          install: >-
            git
            make
            python3
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-toolchain
            mingw-w64-clang-aarch64-ninja
            mingw-w64-clang-aarch64-pkg-config
            mingw-w64-clang-aarch64-glib2
            mingw-w64-clang-aarch64-pixman
            mingw-w64-clang-aarch64-libgcrypt
            mingw-w64-clang-aarch64-gnutls
            mingw-w64-clang-aarch64-capstone
            mingw-w64-clang-aarch64-ntldd
            mingw-w64-x86_64-nsis

      - name: Download and Install NSIS EnVar Plugin
        run: |-
            curl -sSfL -o envar_plugin.zip \
            https://github.com/GsNSIS/EnVar/releases/latest/download/EnVar-Plugin.zip

            # The Generate Installer step uses the NATIVE Windows x64 makensis
            # (from the runner's pre-installed NSIS at C:\Program Files (x86)\NSIS).
            # That binary looks for plugins in ITS OWN directory, not the MSYS2 one.
            # We must extract EnVar.dll into both of its plugin subdirs.
            NSIS_WIN="C:\\Program Files (x86)\\NSIS"
            NSIS_POSIX=$(cygpath -u "$NSIS_WIN")

            mkdir -p "$NSIS_POSIX/Plugins/amd64-unicode"
            mkdir -p "$NSIS_POSIX/Plugins/x86-unicode"

            unzip -j envar_plugin.zip "Plugins/amd64-unicode/EnVar.dll" \
              -d "$NSIS_POSIX/Plugins/amd64-unicode/"
            unzip -j envar_plugin.zip "Plugins/x86-unicode/EnVar.dll" \
              -d "$NSIS_POSIX/Plugins/x86-unicode/"

            echo "EnVar plugin installed to: $NSIS_POSIX/Plugins/"
            ls "$NSIS_POSIX/Plugins/x86-unicode/"

      - name: Configure QEMU Execution Layers (WHPX Enabled)
        run: |
            # --prefix must satisfy two constraints simultaneously:
            #   1. meson/Windows APIs need a real drive-letter path (C:/...)
            #      not a POSIX /c/... path, otherwise ninja install goes nowhere
            #   2. meson bakes the value into a C string literal in config-host.h:
            #        #define CONFIG_PREFIX "..."
            #      backslashes become invalid escape sequences (\a, \q, etc.)
            #      and the build fails to compile — so NO backslashes allowed.
            # `cygpath -m` produces exactly the right format: C:/a/.../dir
            INSTALL_PREFIX=$(cygpath -m "$GITHUB_WORKSPACE")/qemu-windows-arm64
            SOURCE_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/qemu-source

            cd "$SOURCE_DIR"
            ./configure \
                --target-list=aarch64-softmmu,x86_64-softmmu \
                --enable-whpx \
                --enable-gnutls \
                --enable-gcrypt \
                --prefix="$INSTALL_PREFIX"

      - name: Compile Source Code Engine
        run: |
            # Always use cygpath to convert to POSIX — raw $GITHUB_WORKSPACE is a
            # Windows path and will silently misdirect cd inside the MSYS2 shell.
            SOURCE_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/qemu-source
            cd "$SOURCE_DIR"
            make -j$(nproc)
            make install

      - name: Flatten App Structure and Bundle Required DLLs
        run: |
          OUTDIR=$(cygpath -u "$GITHUB_WORKSPACE")/qemu-windows-arm64
          SOURCE_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/qemu-source

          # Copy firmware/keymaps from share/ into root for flat layout
          if [ -d "$OUTDIR/share" ]; then
            cp -r "$OUTDIR/share/"* "$OUTDIR/"
          fi

          # Use QEMU's own bundling script if present (QEMU 8.0+)
          if [ -f "$SOURCE_DIR/scripts/qemu-bundle.py" ]; then
            echo "Using qemu-bundle.py from source tree"
            python3 "$SOURCE_DIR/scripts/qemu-bundle.py" \
              --build-dir "$SOURCE_DIR/build" \
              --install-dir "$OUTDIR"

          else
            echo "qemu-bundle.py not found — falling back to ntldd + known DLL list"

            # Pass 1: ntldd scan of EXEs
            for exe in "$OUTDIR/"*.exe; do
              ntldd -R "$exe" \
                | grep -i '/clangarm64/' \
                | awk '$3 != "not" {print $3}' \
                | xargs -r -I{} cp --no-clobber "{}" "$OUTDIR/" || true
            done

            # Pass 2: ntldd scan of copied DLLs (catches transitive deps)
            for dll in "$OUTDIR/"*.dll; do
              ntldd -R "$dll" \
                | grep -i '/clangarm64/' \
                | awk '$3 != "not" {print $3}' \
                | xargs -r -I{} cp --no-clobber "{}" "$OUTDIR/" || true
            done

            # Pass 3: hard-copy known runtime-loaded DLLs that ntldd cannot detect
            # (g_module_open, delay-loaded, GnuTLS chain, CLANGARM64 runtime)
            for dll in \
              libgmodule-2.0-0.dll \
              libgio-2.0-0.dll \
              libgthread-2.0-0.dll \
              libpcre2-8-0.dll \
              libpcre2-16-0.dll \
              libffi-8.dll \
              libiconv-2.dll \
              libintl-8.dll \
              libbz2-1.dll \
              libzstd.dll \
              liblz4.dll \
              libgnutls-30.dll \
              libhogweed-6.dll \
              libnettle-8.dll \
              libgmp-10.dll \
              libunistring-5.dll \
              libidn2-0.dll \
              libp11-kit-0.dll \
              libtasn1-6.dll \
              libgcrypt-20.dll \
              libgpg-error-0.dll \
              libcapstone.dll \
              libslirp-0.dll \
              libpixman-1-0.dll; do
              src="/clangarm64/bin/$dll"
              [ -f "$src" ] && cp --no-clobber "$src" "$OUTDIR/" && echo "copied: $dll" || true
            done
          fi

          rm -rf "$OUTDIR/share" "$OUTDIR/include" "$OUTDIR/lib"

          echo "=== Final DLL list ==="
          ls "$OUTDIR/"*.dll | xargs -I{} basename {}
      - name: Test Compiled Binaries (Health Check)
        run: |
          OUTDIR=$(cygpath -u "$GITHUB_WORKSPACE")/qemu-windows-arm64

          echo "Testing ARM64 emulator..."
          "$OUTDIR/qemu-system-aarch64.exe" --version

          echo "Testing x86_64 emulator..."
          "$OUTDIR/qemu-system-x86_64.exe" --version

          echo "Health check passed — all required DLLs are present and binaries execute."

      - name: Upload Debug Logs (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-build-debug-logs
          path: |
            ${{ github.workspace }}/qemu-source/build/meson-logs/meson-log.txt
            ${{ github.workspace }}/qemu-source/build/meson-logs/testlog.txt

      - name: Generate User-Scoped Installer
        run: |
          WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
          cp "$WORKSPACE/config-repo/installer.nsi" "$WORKSPACE/"
          # makensis is the native Windows x64 binary — give it a Windows path
          makensis "$(cygpath -w "$WORKSPACE")/installer.nsi"

      - name: Sign Installer (Self-Signed Placeholder)
        # NOTE: This produces a self-signed cert for build traceability only.
        # SmartScreen reputation requires an EV code-signing cert from a trusted CA.
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert `
            -Subject "CN=QEMUWinARM64-Build" `
            -CertStoreLocation "Cert:\CurrentUser\My"

          $password = ConvertTo-SecureString "Password123" -AsPlainText -Force
          Export-PfxCertificate -Cert $cert `
            -FilePath "$env:GITHUB_WORKSPACE\certificate.pfx" `
            -Password $password

          # Get-ChildItem -Recurse finds signtool alphabetically and picks arm\ first.
          # Explicitly prefer x64\ since the runner is x64; fall back to any match.
          $signtool = Get-ChildItem `
            -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Filter signtool.exe -Recurse |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            $signtool = Get-ChildItem `
              -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Filter signtool.exe -Recurse |
              Select-Object -First 1 -ExpandProperty FullName
          }

          Write-Host "Using signtool: $signtool"

          & $signtool sign `
            /f "$env:GITHUB_WORKSPACE\certificate.pfx" `
            /p "Password123" `
            /fd SHA256 `
            /d "QEMU for Windows ARM64" `
            "$env:GITHUB_WORKSPACE\qemu-user-setup.exe"

      - name: Upload Raw Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-raw-binaries-arm64
          path: ${{ github.workspace }}/qemu-windows-arm64/
          retention-days: 7

      - name: Push Installer to GitHub Releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $TagName = "${{ env.QEMU_REF }}"
          if ($TagName -notmatch '^v') { $TagName = "manual-snapshot-$TagName" }

          # Delete any existing release and its tag via the GitHub API only.
          # We do NOT use `git tag -d` or `git push origin :refs/tags/...` here
          # because the working directory is not the workflow repo — it is the
          # qemu-source checkout — and pushing would target the wrong remote.
          # `gh release delete --cleanup-tag` handles both in one API call.
          gh release delete $TagName --repo "${{ github.repository }}" --cleanup-tag --yes 2>$null
          $LASTEXITCODE = 0

          $notes = "Native QEMU build for Snapdragon / Windows 11 ARM64.`nTargets: aarch64-softmmu, x86_64-softmmu. WHPX acceleration enabled. User-scoped installer — no admin credentials required. Supports custom install paths and secondary drives."

          gh release create $TagName `
            "$env:GITHUB_WORKSPACE\qemu-user-setup.exe" `
            --repo "${{ github.repository }}" `
            --title "QEMU Windows ARM64 — $TagName" `
            --notes $notes