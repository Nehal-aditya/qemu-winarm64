name: CI — Validate Release Installer

# Runs automatically when a new release is published by the build workflow,
# and can also be triggered manually to re-check any existing release tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (e.g. v11.0.0). Leave blank to use the latest release."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  validate:
    name: Validate Installer from Release
    runs-on: windows-11-arm

    steps:
      # ---------------------------------------------------------------
      # 1. Resolve which release tag to test
      # ---------------------------------------------------------------
      - name: Resolve Release Tag
        id: tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $input = "${{ github.event.inputs.tag }}"

          if ($input -ne "") {
            $tag = $input
            Write-Host "Using manually specified tag: $tag"
          } elseif ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
            Write-Host "Using release event tag: $tag"
          } else {
            # Fall back to latest release via GitHub API.
            # --repo is required: there is no checkout in this workflow,
            # so gh cannot infer the repo from .git in the CWD.
            $resp = gh release list --limit 1 --json tagName --repo "${{ github.repository }}" | ConvertFrom-Json
            if (-not $resp -or $resp.Count -eq 0) {
              Write-Error "No releases found in ${{ github.repository }}."
              exit 1
            }
            $tag = $resp[0].tagName
            Write-Host "Using latest release tag: $tag"
          }

          if ($tag -eq "") {
            Write-Error "Could not resolve a release tag."
            exit 1
          }

          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      # ---------------------------------------------------------------
      # 2. Download the installer from the resolved release
      # ---------------------------------------------------------------
      - name: Download Installer from Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          Write-Host "Downloading qemu-user-setup.exe from release $tag ..."
          gh release download $tag `
            --pattern "qemu-user-setup.exe" `
            --dir "$env:TEMP\qemu-ci" `
            --repo "${{ github.repository }}"
          if (-not (Test-Path "$env:TEMP\qemu-ci\qemu-user-setup.exe")) {
            Write-Error "Installer not found in release $tag."
            exit 1
          }
          $size = (Get-Item "$env:TEMP\qemu-ci\qemu-user-setup.exe").Length
          Write-Host "Downloaded installer: $size bytes"
          if ($size -lt 10MB) {
            Write-Error "Installer is suspiciously small ($size bytes). Build may have been incomplete."
            exit 1
          }

      # ---------------------------------------------------------------
      # 3. Verify installer is a valid PE executable (not corrupted)
      # ---------------------------------------------------------------
      - name: Verify Installer Is a Valid PE Binary
        shell: pwsh
        run: |
          $path = "$env:TEMP\qemu-ci\qemu-user-setup.exe"
          $bytes = [System.IO.File]::ReadAllBytes($path)
          # PE files start with MZ (0x4D 0x5A)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Installer does not have a valid MZ/PE header. File may be corrupted."
            exit 1
          }
          Write-Host "PE header check passed (MZ signature present)."

      # ---------------------------------------------------------------
      # 4. Run silent install to a temp directory
      # ---------------------------------------------------------------
      - name: Run Silent Install
        shell: pwsh
        run: |
          $installer = "$env:TEMP\qemu-ci\qemu-user-setup.exe"
          $installDir = "$env:TEMP\qemu-ci\install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          Write-Host "Running silent install to: $installDir"
          # /S = NSIS silent mode, /D= sets install directory (must be last, no quotes)
          $proc = Start-Process -FilePath $installer `
            -ArgumentList "/S /D=$installDir" `
            -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited with code $($proc.ExitCode)."
            exit 1
          }
          echo "INSTALL_DIR=$installDir" >> $env:GITHUB_ENV

      # ---------------------------------------------------------------
      # 4b. Diagnose DLL dependencies before version check
      # ---------------------------------------------------------------
      - name: Diagnose DLL Dependencies
        shell: pwsh
        run: |
          $dir = $env:INSTALL_DIR
          $exe = "$dir\qemu-system-aarch64.exe"

          Write-Host "=== DLLs present in install dir ==="
          Get-ChildItem "$dir\*.dll" | Select-Object -ExpandProperty Name | Sort-Object

          Write-Host ""
          Write-Host "=== Checking imports via dumpbin ==="
          # dumpbin is part of MSVC build tools — may not be present on ARM64 runner.
          # Fall back to reading the PE import table manually if unavailable.
          $dumpbin = Get-Command dumpbin -ErrorAction SilentlyContinue
          if ($dumpbin) {
            & dumpbin /dependents $exe | Select-String "\.dll"
          } else {
            Write-Host "dumpbin not available — reading PE import table directly."
            # Read the PE import directory manually to list required DLLs
            Add-Type -TypeDefinition @"
using System;
using System.IO;
using System.Text;
using System.Collections.Generic;
public class PEReader {
    public static List<string> GetImports(string path) {
        var result = new List<string>();
        using var fs = new FileStream(path, FileMode.Open, FileAccess.Read);
        using var br = new BinaryReader(fs);
        // MZ header
        fs.Seek(0x3C, SeekOrigin.Begin);
        int peOffset = br.ReadInt32();
        fs.Seek(peOffset, SeekOrigin.Begin);
        uint sig = br.ReadUInt32(); // PE\0\0
        if (sig != 0x00004550) return result;
        // COFF header
        ushort machine = br.ReadUInt16();
        ushort numSections = br.ReadUInt16();
        fs.Seek(12, SeekOrigin.Current); // skip timestamp, symtable, numsyms
        ushort optHeaderSize = br.ReadUInt16();
        ushort characteristics = br.ReadUInt16();
        // Optional header — detect PE32 vs PE32+
        long optStart = fs.Position;
        ushort magic = br.ReadUInt16();
        bool isPE32Plus = (magic == 0x20b);
        // Skip to data directories
        fs.Seek(optStart + (isPE32Plus ? 112 : 96), SeekOrigin.Begin);
        // Data directory [1] = import table
        fs.Seek(8, SeekOrigin.Current); // skip export dir
        uint importRVA  = br.ReadUInt32();
        uint importSize = br.ReadUInt32();
        if (importRVA == 0) return result;
        // Read section headers to resolve RVA → file offset
        fs.Seek(optStart + optHeaderSize, SeekOrigin.Begin);
        long[] secVA  = new long[numSections];
        long[] secOff = new long[numSections];
        long[] secSz  = new long[numSections];
        for (int i = 0; i < numSections; i++) {
            fs.Seek(8, SeekOrigin.Current); // name
            secSz[i]  = br.ReadUInt32();
            secVA[i]  = br.ReadUInt32();
            uint rawSz = br.ReadUInt32();
            secOff[i] = br.ReadUInt32();
            fs.Seek(16, SeekOrigin.Current);
        }
        Func<long,long> rva2off = rva => {
            for (int i = 0; i < numSections; i++)
                if (rva >= secVA[i] && rva < secVA[i] + secSz[i])
                    return secOff[i] + (rva - secVA[i]);
            return -1;
        };
        long importOff = rva2off(importRVA);
        if (importOff < 0) return result;
        fs.Seek(importOff, SeekOrigin.Begin);
        while (true) {
            uint iltRVA  = br.ReadUInt32();
            fs.Seek(8, SeekOrigin.Current);
            uint nameRVA = br.ReadUInt32();
            fs.Seek(4, SeekOrigin.Current);
            if (nameRVA == 0) break;
            long nameOff = rva2off(nameRVA);
            if (nameOff < 0) break;
            long saved = fs.Position;
            fs.Seek(nameOff, SeekOrigin.Begin);
            var sb = new StringBuilder();
            int b;
            while ((b = fs.ReadByte()) > 0) sb.Append((char)b);
            result.Add(sb.ToString());
            fs.Seek(saved, SeekOrigin.Begin);
        }
        return result;
    }
}
"@
            $imports = [PEReader]::GetImports($exe)
            Write-Host "DLLs required by qemu-system-aarch64.exe:"
            $imports | Sort-Object | ForEach-Object {
              $present = Test-Path "$dir\$_"
              $status  = if ($present) { "OK    " } else {
                # Check if it's a known Windows system DLL
                $sysdll = Test-Path "$env:SystemRoot\System32\$_"
                if ($sysdll) { "SYSDLL" } else { "MISSING >>>" }
              }
              Write-Host "  [$status] $_"
            }
          }


      - name: Verify Installed Files
        shell: pwsh
        run: |
          $dir = $env:INSTALL_DIR
          $required = @(
            "qemu-system-aarch64.exe",
            "qemu-system-x86_64.exe",
            "qemu-img.exe",
            "qemu-io.exe",
            "uninstall.exe"
          )
          $missing = @()
          foreach ($f in $required) {
            if (Test-Path "$dir\$f") {
              Write-Host "FOUND: $f"
            } else {
              Write-Host "MISSING: $f"
              $missing += $f
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing files after install: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required files present."

      # ---------------------------------------------------------------
      # 6. Verify binaries report correct version
      # ---------------------------------------------------------------
      - name: Check Binary Versions
        shell: pwsh
        run: |
          $dir  = $env:INSTALL_DIR
          $tag  = "${{ steps.tag.outputs.TAG }}"
          # Strip leading 'v' for version string comparison (v11.0.0 → 11.0.0)
          $ver  = $tag.TrimStart("v")
          $pass = $true

          foreach ($exe in @("qemu-system-aarch64.exe", "qemu-system-x86_64.exe")) {
            $exePath = "$dir\$exe"
            Write-Host "---"
            Write-Host "Testing: $exePath"

            # --- DLL dependency check first ---
            # Load the binary's import table via Get-Item + PE parsing is complex;
            # instead just attempt to start the process with a 5s timeout and
            # capture stdout + stderr via redirected handles — the most reliable
            # approach on Windows ARM64 runners where console-subsystem quirks vary.
            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName               = $exePath
            $psi.Arguments              = "--version"
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError  = $true
            $psi.UseShellExecute        = $false
            $psi.CreateNoWindow         = $true

            $proc = New-Object System.Diagnostics.Process
            $proc.StartInfo = $psi

            try {
              $proc.Start() | Out-Null
              # Read both streams before WaitForExit to avoid deadlock
              $stdout = $proc.StandardOutput.ReadToEnd()
              $stderr = $proc.StandardError.ReadToEnd()
              $proc.WaitForExit(5000) | Out-Null
              $exitCode = $proc.ExitCode
            } catch {
              Write-Error "${exe}: failed to start — $_"
              Write-Host "This usually means a required DLL is missing from $dir"
              Write-Host "DLLs present in install dir:"
              Get-ChildItem "$dir\*.dll" | Select-Object -ExpandProperty Name | Sort-Object
              $pass = $false
              continue
            }

            $out = ($stdout + $stderr).Trim()
            Write-Host "${exe} exit code: $exitCode"
            Write-Host "${exe} output: $out"

            if ($exitCode -ne 0 -or -not $out) {
              Write-Error "${exe} exited with code $exitCode and produced no usable output."
              Write-Host "DLLs present in install dir:"
              Get-ChildItem "$dir\*.dll" | Select-Object -ExpandProperty Name | Sort-Object
              $pass = $false
              continue
            }

            if ($out -notmatch [regex]::Escape($ver)) {
              Write-Warning "${exe} output does not contain expected version '$ver'. Got: $out"
              $pass = $false
            } else {
              Write-Host "${exe}: version check passed."
            }
          }
          if (-not $pass) { exit 1 }

      # ---------------------------------------------------------------
      # 7. Verify PATH was updated for the current user
      # ---------------------------------------------------------------
      - name: Verify PATH Entry
        shell: pwsh
        run: |
          $dir = $env:INSTALL_DIR
          # Read HKCU PATH directly from registry — not the process PATH,
          # which may not have been refreshed in this session yet.
          $regPath = (Get-ItemProperty -Path "HKCU:\Environment" -Name "PATH" -ErrorAction SilentlyContinue).PATH
          if ($regPath -like "*$dir*") {
            Write-Host "PATH entry confirmed in HKCU\Environment: $dir"
          } else {
            Write-Error "Install directory not found in HKCU PATH.`nRegistry PATH: $regPath"
            exit 1
          }

      # ---------------------------------------------------------------
      # 8. Run silent uninstall
      # ---------------------------------------------------------------
      - name: Run Silent Uninstall
        shell: pwsh
        run: |
          $uninstaller = "$env:INSTALL_DIR\uninstall.exe"
          if (-not (Test-Path $uninstaller)) {
            Write-Error "Uninstaller not found at: $uninstaller"
            exit 1
          }
          Write-Host "Running silent uninstall..."
          $proc = Start-Process -FilePath $uninstaller -ArgumentList "/S" -Wait -PassThru
          Write-Host "Uninstaller exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Error "Uninstaller exited with code $($proc.ExitCode)."
            exit 1
          }

      # ---------------------------------------------------------------
      # 9. Verify install directory was removed
      # ---------------------------------------------------------------
      - name: Verify Directory Removed
        shell: pwsh
        run: |
          $dir = $env:INSTALL_DIR
          if (Test-Path $dir) {
            # Some files may be scheduled for deletion on reboot (/REBOOTOK).
            # List what's left so the log is informative rather than just failing.
            Write-Warning "Install directory still exists after uninstall: $dir"
            Get-ChildItem $dir -Recurse | Select-Object FullName | Format-Table -AutoSize
            # Not a hard failure — /REBOOTOK files are expected on a live system.
          } else {
            Write-Host "Install directory successfully removed."
          }

      # ---------------------------------------------------------------
      # 10. Verify PATH entry was removed
      # ---------------------------------------------------------------
      - name: Verify PATH Entry Removed
        shell: pwsh
        run: |
          $dir     = $env:INSTALL_DIR
          $regPath = (Get-ItemProperty -Path "HKCU:\Environment" -Name "PATH" -ErrorAction SilentlyContinue).PATH
          if ($regPath -like "*$dir*") {
            Write-Error "Install directory still present in HKCU PATH after uninstall.`nPATH: $regPath"
            exit 1
          } else {
            Write-Host "PATH entry correctly removed after uninstall."
          }

      # ---------------------------------------------------------------
      # 11. Verify registry key was removed
      # ---------------------------------------------------------------
      - name: Verify Registry Key Removed
        shell: pwsh
        run: |
          $key = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\QEMUArm64"
          if (Test-Path $key) {
            Write-Error "Uninstall registry key still present after uninstall: $key"
            exit 1
          } else {
            Write-Host "Registry key correctly removed after uninstall."
          }

      # ---------------------------------------------------------------
      # 12. Summary
      # ---------------------------------------------------------------
      - name: CI Summary
        if: success()
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  CI PASSED for release $tag"
          Write-Host "  - Installer downloaded and verified"
          Write-Host "  - Silent install succeeded"
          Write-Host "  - All required files present"
          Write-Host "  - Binary versions correct"
          Write-Host "  - PATH entry added correctly"
          Write-Host "  - Silent uninstall succeeded"
          Write-Host "  - PATH entry removed correctly"
          Write-Host "  - Registry key cleaned up"
          Write-Host "========================================"